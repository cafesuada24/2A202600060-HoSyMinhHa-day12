# ============================================================
# railway.toml — Railway deployment configuration
#
# Docs: https://docs.railway.com/reference/config-as-code
# ============================================================

[build]
builder = "DOCKERFILE"

[deploy]
startCommand = "uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2"

healthcheckPath = "/health"
healthcheckTimeout = 60
healthcheckInterval = 5

restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[variables]
HOST = "0.0.0.0"
PORT = 8000
WORKERS = 2
ENVIRONMENT = "development"
APP_NAME = "AI Agent"
APP_VERSION = "1.0.0"
# ============================================================
# Environment variables CẦN THIẾT cho Production:
#   railway variables set ENVIRONMENT=production
#   railway variables set AGENT_API_KEY=... (Bắt buộc ở production)
#   railway variables set JWT_SECRET=...      (Bắt buộc ở production)
#   railway variables set OPENAI_API_KEY=sk-...
# ============================================================
